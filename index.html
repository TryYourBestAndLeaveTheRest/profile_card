<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <article data-testid="test-profile-card">
        <header>
            <h2 data-testid="test-user-name">Your Name</h2>
        </header>
        <figure>
            <img src="https://via.placeholder.com/150" alt="A placeholder image of a user avatar" data-testid="test-user-avatar">
        </figure>
        <p data-testid="test-user-bio">A short bio about yourself.</p>
        <p>Current time: <span data-testid="test-user-time"></span></p>
        <nav>
            <ul data-testid="test-user-social-links">
                <li><a href="#" data-testid="test-user-social-twitter" target="_blank" rel="noopener noreferrer">Twitter</a></li>
                <li><a href="#" data-testid="test-user-social-linkedin" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
                <li><a href="#" data-testid="test-user-social-github" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            </ul>
        </nav>
        <section>
            <h3>Hobbies</h3>
            <ul data-testid="test-user-hobbies">
                <li>Hobby 1</li>
                <li>Hobby 2</li>
                <li>Hobby 3</li>
            </ul>
        </section>
        <section>
            <h3>Dislikes</h3>
            <ul data-testid="test-user-dislikes">
                <li>Dislike 1</li>
                <li>Dislike 2</li>
                <li>Dislike 3</li>
            </ul>
        </section>
    </article>
    <script src="script.js"></script>
</body>
</html>
